<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portfolio of websites and applications">
  <title>Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="noise"></div>

  <header>
    <div class="container">
      <div class="header-content">
        <span class="badge">Portfolio</span>
        <h1>Projects</h1>
        <p class="subtitle">Collection of websites and applications, gathered in one place</p>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
    </div>
    <div class="projects-grid" id="projects"></div>
  </main>

  <footer>
    <div class="container">
      <span class="footer-line"></span>
      <p>&copy; <span id="year"></span> Portfolio</p>
    </div>
  </footer>

  <script src="projects.js"></script>
  <script src="script.js"></script>
</body>
</html>
